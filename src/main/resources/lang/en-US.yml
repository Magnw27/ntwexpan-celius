  NTW_EXPANSION_DRAWER_TIPS:
    name: "Drawer Usage Tips"
    lore:
      - "1. When using a drawer, be sure to remember the drawer's id (visible in the GUI), which can be used to ask an admin for compensation if the drawer becomes bricked"
      - "2. If the drawer becomes bricked, ask an admin to place a new drawer, and look at the drawer and use /networks setContainerId <id>, then break and replace the drawer"
      - "Command example: /networks setContainerId 1037"

