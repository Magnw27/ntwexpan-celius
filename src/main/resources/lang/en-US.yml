  NTW_AUTO_CRAFTER:
    name: "Network Auto Crafter"
    lore:
      - "The Network Auto Crafter requires a crafting blueprint to work."
      - "When the network does not have the target item of the blueprint,"
      - "the machine will automatically select materials from the network to craft"
      - "(requires sufficient raw materials in the network)"
      - ""
      - "<click_info>Network Power Cost: <passive>64 per craft"

  NTW_AUTO_CRAFTER_WITHHOLDING:
    name: "Network Auto Crafter (Withholding)"
    lore:
      - "The Network Auto Crafter requires a crafting blueprint to work."
      - "When the network does not have the target item of the blueprint,"
      - "the machine will automatically select materials from the network to craft"
      - "(requires sufficient raw materials in the network)"
      - ""
      - "The withholding version of the auto crafter will continuously craft"
      - "until the output slot has 1 stack of items"
      - "This stack of items can be accessed in the network"
      - "and can also be extracted through the cargo system"
      - ""
