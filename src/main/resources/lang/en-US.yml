    help:
      - "&6Networks Command Help:"
      - "&6/networks help - Shows this help message."
      - "&6/networks fillquantum <amount> - Fills the held quantum storage with the specified amount."
      - "&6/networks fixblueprint <keyInMeta> - Fixes the held crafting blueprint."
      - "&6/networks addstorageitem <amount> - Adds items to the network drawer you are looking at."
      - "&6/networks reducestorageitem <amount> - Reduces items from the network drawer you are looking at."
      - "&6/networks setquantum <amount> - Sets the held quantum storage with the specified amount."
      - "&6/networks setcontainerid <containerId> - Sets the container ID of the network drawer."
      - "&6/networks worldedit <subCommand> - Slimefun WorldEdit functions."
      - "&6/networks updateItem - Updates the held item."
      - "&6/networks getstorageitem <slot> - Gets the item from the specified slot of the network drawer you are looking at."
      - "&6/networks viewLog - Outputs the log of the AdminDebuggable you are pointing at."
    example:
      help:
        - "&6/networks help - Shows this help message."
        - "&6ex: /networks help"
      fillquantum:
        - "&6/networks fillQuantum <amount> - Sets the amount of the held quantum storage."
        - "&6ex: /networks fillQuantum 1000"
      fixblueprint:
        - "&6/networks fixBlueprint <keyInMeta> - Fixes the held crafting blueprint."
        - "&6ex: /networks fixBlueprint networks-changed"
      addstorageitem:
        - "&6/networks addStorageItem <amount> - Adds the specified amount of the held item to the cargo storage you are pointing at."
        - "&6ex: /networks addstorageItem 1000"
      reducestorageitem:
        - "&6/networks reduceStorageItem <amount> - Reduces the specified amount of the held item from the cargo storage you are pointing at."
        - "&6ex: /networks reduceStorageItem 1000"
      setquantum:
        - "&6/networks setQuantum <amount> - Sets the item in the quantum storage you are pointing at to the item in your hand, and sets the specified amount."
        - "&6ex: /networks setQuantum 1000"
      setcontainerid:
        - "&6/networks setContainerId <containerId> - Sets the container ID of the cargo storage you are pointing at."
        - "&6ex: /networks setContainerId 6"
      getstorageitem:
        - "&6/networks getStorageItem <slot> - Gets the item from the specified slot of the cargo storage you are pointing at."
        - "&6ex: /networks getStorageItem 0"
      worldedit:
        - "&6/networks worldedit <subCommand> - Slimefun WorldEdit functions."
        - "&6/networks worldedit pos1 - Select the first position"
        - "&6/networks worldedit pos2 - Select the second position"
        - "&6/networks worldedit paste <sfid> <handler> <force> - Paste a Slimefun block"
        - "&6/networks worldedit clear <callHandler> <skipVanilla> - Clear Slimefun blocks"
        - "&6/networks worldedit blockMenu setSlot <slot> - Modifies the corresponding slot of the Slimefun method's menu in the selected area to the item in hand"
        - "&6/networks worldedit blockInfo add <key> <value> - Add Slimefun block information"
        - "&6/networks worldedit blockInfo remove <value> - Remove Slimefun block information"
        - "&6/networks worldedit blockInfo set <key> <value> - Set Slimefun block information"
        - "&6/networks worldedit clone - Clone the selected area to your location"
        - "&6/networks worldedit clearPos - Clear the selected positions"
        - "&6/networks worldedit showAreaOutline - Show the outline of the selected area"
      updateitem:
        - "&6/networks updateItem - Updates the held item."
        - "&6ex: /networks updateItem"
      viewlog:
        - "&6/networks viewLog - Outputs the log of the AdminDebuggable you are pointing at."
        - "&6ex: /networks viewLog"
