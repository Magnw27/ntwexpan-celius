      - "to input the items from this machine into the network."

  NTW_VANILLA_PUSHER:
    name: "Network Vanilla Container Pusher"
    lore:
      - "The Network Vanilla Container Pusher will try to"
      - "push the items inside into the specified vanilla container."
      - ""
      - "This machine cannot interact directly with the network,"
      - "you also need a Network Pusher"
      - "to push items from the network into this machine."

  NTW_NETWORK_WIRELESS_TRANSMITTER:
    name: "Network Wireless Transmitter"
    lore:
      - "The Network Wireless Transmitter can"
      - "transfer the items inside to the bound"
      - "Network Wireless Receiver (only in the same world)."
      - "Use the Network Wireless Configurator to bind."
      - "Each transfer consumes 500 J of network power."

  NTW_EXPANSION_ADVANCED_WIRELESS_TRANSMITTER:
    name: "Advanced Network Wireless Transmitter"
    lore:
      - "The Advanced Network Wireless Transmitter can"
      - "transfer the items inside to the bound"
      - "Network Wireless Receiver (only in the same world)."
      - "Use the Network Wireless Configurator to bind."

  NTW_NETWORK_WIRELESS_RECEIVER:
    name: "Network Wireless Receiver"
    lore:
      - "The Network Wireless Receiver can"
      - "receive items from the bound Network Wireless Transmitter"
      - "(only in the same world)."
      - "Every Slimefun tick, it will try to push"
      - "the received items into the network."

  NTW_TRASH:
    name: "Network Purger"
    lore:
      - "The Network Purger will"
      - "continuously remove specified items from the network"
      - "The purged items will disappear immediately, use with caution!"

  NTW_GRID:
    name: "Grid"
    lore:
      - "The Grid allows you to view all items in the network"
      - "You can also directly insert or extract items"
      - "Supports Pinyin search"

  NTW_CRAFTING_GRID:
    name: "Grid (with Crafting)"
    lore:
      - "This grid is similar to a normal grid"
      - "but it will show fewer items"
      - "However, you can directly use items from the network"
      - "for crafting"
      - "Supports Pinyin search"

  NTW_CELL:
    name: "Network Cell"
    lore:
      - "The Network Cell has 54 slots of space (equivalent to a large chest)"
      - "You can access the items inside through the network"
      - "and can also be opened directly"

  NTW_GREEDY_BLOCK:
    name: "Network Blocker"
    lore:
      - "The Network Blocker can be set with an item,"
      - "then it will collect the specified item from various inputs in the network,"
      - "up to a maximum of 1 stack."
      - "Once full, it will block the transmission of that item in the network,"
      - "and no other network block will receive that item."

