items:
  # DO NOT CHANGE OR DELETE THESE ANNOUNCEMENTS
  NTW_EXPANSION_ANNOUNCE_1:
    name: "<color_random_string>Definitions"
    lore:
      - "<warning> 1) Declaration refers to all declarations here."
      - "<warning> 2) Networks refers to a Slimefun addon, not the internet, IoT, or any other traditional sense of a network."
      - "<warning> 3) NetworksExpansion (hereinafter referred to as \"Networks Expansion\", \"this addon\", or \"this project\") is a Slimefun addon, developed by the Networks Expansion development team based on Networks, fully complying with the GPLv3 license, with appropriate additions, deletions, and modifications, based on Paper 1.20.1 and the Chinese translated version of Slimefun, and is not fully compatible with Paper 1.20.5 and above."
      - "<warning> 4) The Networks Expansion developers (hereinafter referred to as \"the Networks Expansion development team\", \"the Networks Expansion creators\") are the group that develops Networks Expansion, and are not owned by any company or organization."
  NTW_EXPANSION_ANNOUNCE_2:
    name: "<color_random_string>Networks Expansion Work Statement"
    lore:
      - "<warning> Before reading this statement, please be sure to read the definitions."
      - "<warning> 1) Networks Expansion is completely free, shared, and open-source on GitHub for supporters, maintainers, and creators to learn and use."
      - "<warning> 2) The GPLv3 license is the open-source license for Networks Expansion. Anyone can freely use, modify, and distribute it, but any modification or distribution must comply with the GPLv3 license."
      - "<warning> 3) Among them, \"Networks Expansion\" is only the title of this file and does not contain any ambiguity or profit involvement."
      - "<warning> 4) The Networks Expansion developers only act as the creators of this addon and do not provide any commercial support for it, nor are they actively maintaining this addon. In addition, the Networks Expansion developers never participate in any direct or indirect business activities of any server."
      - "<warning> 5) It is strictly forbidden to use the above plugins and this addon to promote any form of negative or violent information; it is strictly forbidden to use the above files for illegal or infringing activities; it is strictly forbidden to involve any political or vulgar content."
      - "<warning> 6) Reselling is strictly forbidden, including but not limited to disguised trading activities, and privately tampering with and using the above files for any profit-making behavior."
      - "<warning> 7) We strongly condemn the above prohibitions and encourage the public to supervise each other and actively report violations and illegal acts."
      - "<warning> 8) You are responsible for all consequences caused by your personal or group's improper use. It is strictly forbidden to shift responsibility to the relevant maintainers and creators of the above plugins and configuration files in any form."
      - "<warning> 9) For infringers, civil liabilities such as stopping the infringement, eliminating the impact, making an apology, and compensating for losses shall be borne according to the circumstances; at the same time, if the public interest is harmed, the copyright administrative department may order the cessation of the infringing act, confiscate the illegal income, confiscate and destroy the infringing copies, and may impose a fine; if the circumstances are serious and constitute a crime, criminal responsibility shall be investigated according to law."
      - "<warning> 10) When the Networks Expansion developers do not pursue the infringing behavior of the infringer, it does not mean that the Networks Expansion developers approve of the infringing behavior. Nor does it mean that the infringer does not need to bear any responsibility."
      - "<warning> Please be sure to comply with the above statement."
  NTW_EXPANSION_ANNOUNCE_3:
    name: "<color_random_string>Networks Expansion Usage Statement"
    lore:
      - "<warning> Before reading this statement, please be sure to read the Networks Expansion Work Statement."
      - "<warning> GuizhanLibPlugin is a prerequisite plugin for this addon, please ensure it is installed correctly."
      - "<warning> The development version of the Chinese translated Slimefun is a prerequisite plugin for this addon, please also ensure it is installed correctly."
      - "<warning> When you use Networks Expansion or its content, you must comply with laws and regulations, and you must not use Networks Expansion or its content to engage in illegal activities, including but not limited to the following:"
      - "<warning> 1. Violating the basic principles established by the Constitution;"
      - "<warning> 1) Endangering national security, leaking state secrets, subverting state policy, and undermining national unity;"
      - "<warning> 2) Harming national honor and interests;"
      - "<warning> 3) Distorting, vilifying, desecrating, or denying the deeds and spirit of heroes and martyrs, or infringing on the name, portrait, reputation, and honor of heroes and martyrs by insult, slander, or other means;"
      - "<warning> 4) Promoting terrorism, extremism, or inciting terrorist or extremist activities;"
      - "<warning> 5) Inciting ethnic hatred, ethnic discrimination, and undermining national unity;"
      - "<warning> 6) Undermining national religious policies, promoting cults and feudal superstitions;"
      - "<warning> 7) Spreading rumors, disrupting social order and social order;"
      - "<warning> 8) Spreading obscenity, pornography, gambling, violence, murder, terror, or inciting crime;"
      - "<warning> 9) Insulting or slandering others, infringing on the reputation, privacy, and other legitimate rights and interests of others;"
      - "<warning> 10) Violating social morality;"
      - "<warning> 11) Other content prohibited by laws, administrative regulations, and national regulations."
      - "<warning> 2. You must not use Networks Expansion or its content to produce, copy, or publish bad information containing the following content:"
      - "<warning> 1) Using exaggerated titles, where the content seriously does not match the title;"
      - "<warning> 2) Hyping up scandals, rumors, misdeeds, etc.;"
      - "<warning> 3) Inappropriately commenting on natural disasters, major accidents, and other disasters;"
      - "<warning> 4) Containing sexual innuendo, sexual provocation, or other content that easily leads to sexual associations;"
      - "<warning> 5) Showing bloody, thrilling, cruel, or other content that causes physical and mental discomfort;"
      - "<warning> 6) Inciting discrimination against groups, regional discrimination, etc.;"
      - "<warning> 7) Promoting vulgar, kitsch, or tacky content;"
      - "<warning> 8) May cause minors to imitate unsafe behaviors and behaviors that violate social morality, induce bad habits in minors, etc.;"
      - "<warning> 9) Other content that has a negative impact on the internet ecosystem."
  NTW_EXPANSION_ANNOUNCE_4:
    name: "<color_random_string>Networks Expansion Author Statement"
    lore:
      - "<warning> Before reading this statement, please be sure to read the Networks Expansion Usage Statement."
      - "<warning> 1) The members of the Networks Expansion development team are all citizens of the People's Republic of China, and they sincerely recognize the theory of socialism with Chinese characteristics and adhere to the leadership of the Communist Party of China."
      - "<warning> 2) The members of the Networks Expansion development team oppose decadent and backward ideas such as capitalism, imperialism, hegemonism, and feudalism."
      - "<warning> 3) The members of the Networks Expansion development team consciously abide by the Constitution and laws and oppose cyber violence."
      - "<warning> 4) The members of the Networks Expansion development team consciously abide by community norms, do not use abusive language, and communicate civilly."
      - "<warning> 5) Any behavior such as insulting or attacking the Networks Expansion development team or its members will be dealt with according to law. If cyber violence such as \"doxing\" is found, it will be reported to the police."
      - "<warning> 6) This statement only represents the position of the Networks Expansion development team and does not represent others, any game, organization, company, country, or social group, nor does it represent any player group of any game."
      - "<warning> 7) This statement is subjectively not biased towards any party, but only addresses the matter itself, not the person."
      - "<passive> This addon was written by Sefiraat, translated into Chinese by ybw0014, and has been added to, deleted from, modified, and subsequently maintained by yitoudaidai and tinalness."
      - "<passive> Thanks to the author of LogiTech for providing the author's head hash."
      - "<passive> Thanks to all server owners who have trusted and installed Networks Expansion."
      - "<passive> This addon was inspired by the majority of players."
      - "<passive> Special thanks to players such as Utoboy, TouRuya, haiman233, matl114 for their suggestions."
      - "<passive> Thanks to testers such as Utoboy, TouRuya, haiman233, yitoudaidai, tinalness, matl114, lengshang for their testing."
  NTW_EXPANSION_ANNOUNCE_5:
    name: "<color_random_string>Networks Expansion Related Links"
    lore:
      - "<warning> Before reading this statement, please be sure to read the Networks Expansion Author Statement."
      - "<passive> The following are the related links for Networks Expansion: (Please recognize the unique links)"
      - "<passive> Networks Expansion Build Site Link: <click_info>https://builds.guizhanss.com/ytdd9527/NetworksExpansion/master/builds"
      - "<passive> Networks Expansion Stable Version GitHub Repository: <click_info>https://github.com/ytdd9527/NetworksExpansion"
      - "<passive> Networks Expansion Stable Version GitHub Issues Link: <click_info>https://github.com/ytdd9527/NetworksExpansion/issues"
      - "<passive> Networks Expansion Stable Version GitHub PR Link: <click_info>https://github.com/ytdd9527/NetworksExpansion/pulls"
      - "<passive> Networks Expansion Development Version Github Repository: <click_info>https://github.com/balugaq/NetworksExpansion"
      - "<warning> The development version of Networks Expansion does not accept GitHub Issues"
      - "<warning> The development version of Networks Expansion does not accept GitHub PRs"
      - "<passive> Networks Expansion Author GitHub Page: <click_info>https://github.com/ytdd9527"
      - "<passive> Networks Expansion Author GitHub Page: <click_info>https://github.com/balugaq"
  NTW_EXPANSION_ANNOUNCE_6:
    name: "<color_random_string>The Purpose of Networks Expansion"
    lore:
      - "<warning> Before reading this statement, please be sure to read the Networks Expansion Related Links."
      - "<passive> The purpose of Networks Expansion is to provide more convenience and enhance the transportation function of Networks."
      - "<passive> At the same time, it is also to reduce the delay problem caused by Networks as much as possible, and to reduce the loopholes and errors caused by Networks."
  NTW_EXPANSION_ANNOUNCE_7:
    name: "<color_random_string>Networks Expansion Q&A"
    lore:
      - "<warning> Before reading this statement, please be sure to read The Purpose of Networks Expansion."
      - "<warning> 1) Why is Networks Expansion frequently modified, and sometimes some strange problems occur?"
      - "<passive> - This is a normal phenomenon. The Networks Expansion development team cannot guarantee that every version will run perfectly. If possible, please use the stable version on the build site."
      - "<warning> 2) Why are some good features not added to Networks Expansion?"
      - "<passive> - Due to the nature of Networks Expansion, some features may not be suitable for use in Networks, because Networks is a transportation system."
      - "<warning> 3) Why were some implemented features that were convenient for players removed in later versions?"
      - "<passive> - The removal of existing features is a decision made by the Networks Expansion development team after long-term consideration, and is not done casually."
      - "<passive> - Generally, some features are removed due to high latency and causing more loopholes."
      - "<passive> - Of course, there are also cases where they are removed due to verbal attacks, malicious behavior, etc. against members of the Networks Expansion development team."
  NTW_EXPANSION_ANNOUNCE_8:
    name: "<color_random_string>Networks Expansion Supplementary Notes"
    lore:
      - "<warning> Before reading this statement, please be sure to read the Networks Expansion Q&A."
      - "<warning> 1) The Networks Expansion developers are not obligated to maintain this addon. For errors, loopholes, and problems that suddenly appear in the stable version of Networks Expansion, please submit an Issue to the stable version's GitHub repository in time."
      - "<passive> 2) We cannot guarantee to fix all problems in time, but we will do our best to fix them."
      - "<passive> 3) When communicating with the developers, you should be polite and not maliciously attack or insult them. This is the effective way to solve your problems."
      - "<warning> 4) When you use, play, or modify Networks Expansion, you are deemed to agree to abide by these statements."
      - "<passive> 5) The Networks Expansion developers reserve the right to modify and terminate this statement at any time."
      - "<warning> 6) When this statement is updated, you should consciously check whether there are any objections. Generally, after a version update, the Networks Expansion development team defaults that you agree to abide by these statements."
      - "<passive> 7) You should avoid involving \"Networks Expansion\" or \"the Networks Expansion development team\" or \"members of the Networks Expansion development team\" in political and public events due to your use of Networks Expansion. <warning>Otherwise, the Networks Expansion development team has the right to suspend or terminate the maintenance of Networks Expansion."
      - "<passive> 8) If there are other language versions of this statement published by the Networks Expansion developers, the Chinese version shall prevail."
      - "<passive> 9) The entry into force, performance, interpretation, and dispute resolution of this statement shall be governed by the laws of the mainland of the People's Republic of China (excluding conflict of laws)."
      - "<passive> 10) All titles in this statement are for reading convenience only and have no actual meaning in themselves, and cannot be used as a basis for interpreting the meaning of this statement."
      - "<warning> 11) If any part of this statement is invalid for any reason, the remaining clauses are still valid and binding on all parties."
      - "<warning> 12) If you cannot view the complete content of the statement due to a small screen or other reasons, please adjust it yourself. The Networks Expansion development team is not responsible for this."
      - "<warning> 13) If you cannot view the complete item name or item description due to a small screen or other reasons, please solve it yourself as a server owner or player. The Networks Expansion development team is not responsible for this."
      - "<warning> 14) Networks Expansion allows anyone to use, copy, modify, merge, publish, distribute, display, and disseminate this statement for non-profit purposes, but no one may use this statement for commercial purposes. And it is forbidden to carry out any publicity in the name of Networks Expansion or the Networks Expansion development team."
      - "<warning> 15) The right to interpret all statements of this addon belongs to the Networks Expansion developers."
  NTW_EXPANSION_ANNOUNCE_9:
    name: "<color_random_string>Networks Expansion Version Information"
    lore:
      - "<warning> Before reading this statement, please be sure to read the Networks Expansion Supplementary Notes."
      - "<passive> This page can be used as the version information you need to provide when reporting problems related to Networks Expansion."
      - "<passive> But a reminder again:"
      - "<warning> The development version of Networks Expansion does not accept GitHub Issues"
      - "<warning> The development version of Networks Expansion does not accept GitHub PRs"
      - "<passive> Version Information:"
      - "<passive> Networks Expansion Version: v2.1.94"
      - "<passive> Version Status: Stable"
      - "<passive> Version Update Time: 2026-4-10 23:27:58"
      - "<passive> Development Status: Updating"
      - "<passive> Developer(s): ytdd9527, balugaq"
      - "<passive> Developer GitHub Page: <click_info>https://github.com/ytdd9527"
      - "<passive> Developer GitHub Page: <click_info>https://github.com/balugaq"
      - "<passive> Networks Expansion Stable Version Download Address: https://builds.guizhanss.com/ytdd9527/NetworksExpansion/master/builds"
      - "<passive> Networks Expansion Development Version Download Address: https://github.com/balugaq/NetworksExpansion"
      - "<passive> Thanks to everyone who has contributed their Issues, PRs, and commits to the development of Networks Expansion!"
      - "<passive> Thanks to everyone who has provided suggestions for the development of Networks Expansion!"
      - "<passive> Thanks to players such as Utoboy, TouRuya, haiman233, yitoudaidai, tinalness, matl114 for their suggestions for the development of Networks Expansion!"
      - "<passive> Thanks again :>"
  NTW_EXPANSION_ANNOUNCE_10:
    name: "<color_random_string>Networks Expansion Gameplay Experience Statement"
    lore:
      - "<warning> Before reading this statement, please be sure to read the Networks Expansion Version Information."
      - "<passive> Regarding the issue of network crafters losing blueprints, according to the announcement issued by the Slimefun developers:"
      - "<passive> —When the item PDC data is too large, the item cannot be saved to the Slimefun database. The server owner needs to adjust the database table data type themselves"
      - "<passive> —and enable the `bypass-item-length-check` option in the settings to skip the item size check."
      - "<passive> The blueprint PDC of the network crafter is usually very large, this is to be compatible with blueprints from years ago and ensure the player's gaming experience."
      - "<passive> In addition, according to matl114's test, upgrading the machine in place may also cause items to be lost:"
      - "<passive> Here is an example of a <warning>possible<passive> reproduction: place machine A, place C quantity of D item in slot B, dig it up and replace it with machine E, place C quantity of D item in slot B,"
      - "<passive> After the server restarts, the D item in machine E disappears."
      - "<passive> The above reasons have little to do with Networks Expansion. It is recommended to remain rational when playing and not to blindly attack Networks Expansion verbally."
      - "<passive> Recently, there have also been <warning>rumors<passive> spreading such as \"using the crafter of Networks Expansion will not lose blueprints\"."
      - "<passive> I hope you all keep your eyes open and are not deceived by such rumors."
      - "<passive> The statement ends here."

